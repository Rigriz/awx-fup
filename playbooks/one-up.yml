---
- hosts: L52,L72,L83,L41
  become: yes
#  serial: 1 
  tasks:
    #- name: Upgrade current system packages
    # command: dnf upgrade --refresh -
   #- name: Perform reboot
    # command: reboot
    - name: 1. Ensure system-upgrade plugin is installed
      dnf:
        name: dnf-plugin-system-upgrade
        state: present

    - name: 2. Clear metadata cache (Fixes 404/Hash errors)
      shell: dnf clean all

    - name: 3. Download Fedora 43 Upgrade
      shell: dnf system-upgrade download --releasever=43 --allowerasing -y --nogpgcheck
      async: 3600
      poll: 30
      register: download_out
       
