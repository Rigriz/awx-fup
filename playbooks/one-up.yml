---
- hosts: R11,R12,R13,R14,R15,R16,R21,R23,R24,R25,R26,R31,R32,R33,R34,R35,R36,R41,R42,R43,R44,R45,R46,R51,R52,R53,54,R55,R56
  become: yes
  tasks:
    - name: 1. Upgrade current packages
      command: dnf upgrade --refresh -y

    - name: 2. Clear metadata cache
      shell: dnf clean all

    - name: 3. Download Fedora 43 Upgrade
      shell: dnf system-upgrade download --releasever=43 --allowerasing -y --nogpgcheck
      register: download_result

    - name: 4. Run system upgrade reboot
      command: dnf system-upgrade reboot
      when: download_result.rc == 0
