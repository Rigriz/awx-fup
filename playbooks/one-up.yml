---
- hosts: L82,L83,L71,L72,L73,L61,L62,L63,L51,L52,L53,L41
  become: yes
  serial: 1 
  tasks:
  - name: Disable broken PyCharm repo
      command: dnf config-manager --set-disabled copr:copr.fedorainfracloud.org:phracek:PyCharm
      ignore_errors: yes

    - name: Import Fedora 43 GPG key
      rpm_key:
        state: present
        # This is the direct link to the actual GPG key file
        key: https://fedoraproject.org
        key: https://fedoraproject.org

    - name:  Upgrade refrsh
      command: >
        sudo dnf upgrade --refresh -y
        
    - name: Download Fedora upgrade
      command: >
        dnf system-upgrade download --releasever=43 --allowerasing -y
