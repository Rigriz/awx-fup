---
- hosts: L82,L83,L71,L72,L73,L61,L62,L63,L51,L52,L53,L41
  become: yes
  tasks:
    - name: Update fedora repos first
      dnf:
        name: fedora-gpg-keys
        state: latest

    - name: Download Fedora upgrade
      command: >
        dnf system-upgrade download
        --releasever=43
        --allowerasing
        -y
