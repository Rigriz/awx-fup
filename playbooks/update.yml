---
- name: Upgrade Fedora and monitor progress
  hosts: all
  become: yes

  tasks:
    - name: Update all packages
      dnf:
        name: "*"
        state: latest
        update_cache: yes
      register: update_result

    - name: Show update details
      debug:
        var: update_result

    - name: Download Fedora upgrade
      command: dnf system-upgrade download --releasever=43 -y
      register: upgrade_download

    - name: Show upgrade download result
      debug:
        var: upgrade_download.stdout

    - name: Start Fedora upgrade reboot
      command: dnf system-upgrade reboot
