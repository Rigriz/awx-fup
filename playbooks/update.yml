---
- name: Update Fedora and install GNOME
  hosts: all
  become: yes

  tasks:
    - name: Update all packages
      dnf:
        name: "*"
        state: latest
        update_cache: yes

    - name: Install GNOME Desktop
      command: dnf groupinstall -y "Server with GUI"

    - name: Set graphical mode as default
      command: systemctl set-default graphical.target
     
    - name: Install latest update Desktop
      command: sudo dnf system-upgrade download --releasever=43  -y "Server with GUI"

    - name: Reboot system
      reboot:
        reboot_timeout: 900
        
    - name: rebot Desktop
      command: sudo dnf system-upgrade reboot  "reboot to new update"
  
